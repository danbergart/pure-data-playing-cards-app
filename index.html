<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pure Code Playing Cards</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container stack" id="appRoot">
      <!-- Buttons row -->
      <div class="row center gap">
        <button id="scanBtn" class="btn">Scan Card Code</button>
        <button id="examplesBtn" class="btn">Examples</button>
      </div>

      <!-- Editor (single textarea to avoid duplicate text) -->
      <textarea
        id="cardInput"
        class="editor"
        spellcheck="false"
        placeholder="Paste or type card JSON here…"
      ></textarea>

      <!-- Render + Plinko toggle row -->
      <div class="row center gap-lg" id="renderRow">
        <button id="renderBtn" class="btn primary">Render Card</button>
      </div>

      <!-- Plinko score display (shown when Plinko is on) -->
      <div class="row center gap" id="plinkoScores" hidden>
        <div class="score-chip">
          <span class="score-label">SCORE</span>
          <span id="plinkoScoreVal">0</span>
        </div>
        <div class="score-chip">
          <span class="score-label">HIGH</span>
          <span id="plinkoHighVal">0</span>
        </div>
      </div>

      <!-- Canvas -->
      <div class="row center">
        <canvas
          id="cardCanvas"
          width="360"
          height="528"
          aria-label="card canvas"
        ></canvas>
      </div>

      <!-- Drop ball row (shown when Plinko is on) -->
      <div class="row center" id="plinkoDropRow" hidden></div>
    </div>

    <!-- Camera overlay is created dynamically by JS -->

    <script src="./app.js"></script>

    <!-- Optional: auto-resize the Shopify iframe (leave in; harmless if not embedded) -->
    <script>
      const postSize = () => {
        const h = document.documentElement.scrollHeight;
        parent?.postMessage?.({ type: "purecode-resize", height: h }, "*");
      };
      new ResizeObserver(postSize).observe(document.documentElement);
      window.addEventListener("load", postSize);
    </script>
  </body>
</html>
